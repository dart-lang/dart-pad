name: package:dartpad_ui

permissions: read-all

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/dartpad_ui.yml'
      - 'pkgs/dartpad_ui/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/dartpad_ui.yml'
      - 'pkgs/dartpad_ui/**'
  schedule:
    - cron: '0 0 * * 0' # weekly

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pkgs/dartpad_ui/
    strategy:
      fail-fast: false
      matrix:
        sdk: [ beta, main ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: ${{ matrix.sdk }}
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze

      - run: dart format --set-exit-if-changed .
        if: matrix.sdk == 'stable'

      - name: Create template projects
        run: dart tool/grind.dart build-project-templates
        working-directory: pkgs/dart_services/

      - run: flutter build web
      - run: flutter test

      - run: tool/check_cycles.sh
