name: package:codemirror-dart

permissions: read-all

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/codemirror_dart.yml'
      - 'pkgs/dartpad_preview/codemirror-dart/**'
      - 'pkgs/dartpad_preview/codemirror-lang-dart/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/codemirror_dart.yml'
      - 'pkgs/dartpad_preview/codemirror-dart/**'
      - 'pkgs/dartpad_preview/codemirror-lang-dart/**'
  schedule:
    - cron: '0 0 * * 0'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Install Dart dependencies
        working-directory: pkgs/dartpad_preview
        run: dart pub get

      - name: Build codemirror-lang-dart
        working-directory: pkgs/dartpad_preview/codemirror-lang-dart
        run: |
          npm ci
          npm run build

      - name: Install codemirror-dart dependencies
        working-directory: pkgs/dartpad_preview/codemirror-dart
        run: npm ci

      - name: Check Dart sources
        working-directory: pkgs/dartpad_preview/codemirror-dart
        run: |
          dart format --output=none --set-exit-if-changed benchmark lib
          dart analyze --fatal-infos

      - name: Check TypeScript and run tests
        working-directory: pkgs/dartpad_preview/codemirror-dart
        run: |
          npm run format:check
          npm run typecheck
          npm test

      - name: Verify generated assets
        working-directory: pkgs/dartpad_preview/codemirror-dart
        run: |
          npm run build
          git diff --exit-code -- lib/assets
